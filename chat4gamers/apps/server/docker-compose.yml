services:
  livekit:
    image: livekit/livekit-server
    container_name: livekit-server
    restart: always
    network_mode: "host"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    command: --config /livekit.yaml

  hono-backend:
    build:
      context: ./GeeGeeChat/chat4gamers/apps/server
    container_name: hono-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - LIVEKIT_API_KEY=REDACTED_LIVEKIT_KEY
      - LIVEKIT_API_SECRET=REDACTED_LIVEKIT_SECRET
    volumes:
      - ./data:/app/data