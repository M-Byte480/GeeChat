name: Main Orchestrator

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'chat4gamers/apps/next/package.json'

jobs:
  analyze-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      server_changed: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_PAT_TOKEN }}

      # 1. Detect which folders changed
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'apps/server/**'
              - 'package.json' # Optional: sync if root deps change


      - name: Manual Yarn Version Bump
        run: |
          cd chat4gamers/apps/next
          
          # Force a version change
          yarn version patch
          
          # Grab the actual version from the file to use in Git
          NEW_VERSION=$(node -p "require('./package.json').version")
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add package.json
          
          # If nothing changed, this commit will fail. 
          # We use || true to keep the script running if there's nothing to commit.
          git commit -m "chore(release): bump version to $NEW_VERSION [skip ci]" || echo "No changes to commit"
          
          # Force the tag to move to the current commit
          git tag -f v$NEW_VERSION
          
          # Push with PAT to trigger the next workflow
          git push https://x-access-token:${{ secrets.MY_PAT_TOKEN }}@github.com/${{ github.repository }}.git main --tags --force

        env:
          GITHUB_TOKEN: ${{ secrets.MY_PAT_TOKEN }}


      # 3. ONLY Sync jarvis-deploy if the server folder changed
      - name: Sync jarvis-deploy
        if: steps.filter.outputs.server == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git fetch origin
          git checkout jarvis-deploy
          git merge main --ff-only
          git push origin jarvis-deploy

      # 1. Bump package.json, Commit, and Tag
      - name: Automated Version Bump
        id: version_bump
        uses: phips28/gh-action-bump-version@master
        env:
          GITHUB_TOKEN: ${{ secrets.MY_PAT_TOKEN }}
          PACKAGEJSON_DIR: 'chat4gamers/apps/next'
        with:
          # This ensures it looks at commit messages (#major, #minor)
          default: patch
          tag-prefix: 'v'
          # This pushes the changed package.json back to main
          skip-tag: 'false'
          commit-message: 'chore(release): bump version to {{version}} [skip ci]'