name: Main Orchestrator

on:
  push:
    branches:
      - disabled
    paths-ignore:
      - 'chat4gamers/apps/next/package.json'

jobs:
  analyze-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      server_changed: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_PAT_TOKEN }}
          persist-credentials: false

      - name: Manual Yarn Version Bump
        id: version_bump
        run: |
          cd chat4gamers/apps/next

          yarn version patch --no-deferred

          export YARN_ENABLE_SCRIPTS=false
          yarn install --mode=skip-build

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add ../../yarn.lock package.json
          git commit -m "chore(release): bump version to $NEW_VERSION [skip ci]" || echo "No changes"
          git tag -f v$NEW_VERSION
          git push https://x-access-token:${{ secrets.MY_PAT_TOKEN }}@github.com/${{ github.repository }}.git main --tags --force

      - name: Sync jarvis-deploy
        if: steps.filter.outputs.server == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git remote set-url origin https://x-access-token:${{ secrets.MY_PAT_TOKEN }}@github.com/${{ github.repository }}.git

          git fetch origin
          git checkout jarvis-deploy
          git merge main --ff-only
          git push origin jarvis-deploy

  tauri:
    needs: analyze-and-sync
    if: vars.ENABLE_TAURI == 'true'
    uses: ./.github/workflows/build-tauri.yml
    secrets: inherit

  electron:
    needs: analyze-and-sync
    if: vars.ENABLE_ELECTRON == 'true'
    uses: ./.github/workflows/build-electron.yml
    secrets: inherit
