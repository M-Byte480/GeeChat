name: Main Orchestrator

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'chat4gamers/apps/next/package.json'

jobs:
  analyze-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      server_changed: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_PAT_TOKEN }}

      # 1. Detect which folders changed
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'apps/server/**'
              - 'package.json' # Optional: sync if root deps change


      - name: Manual Yarn Version Bump
        run: |
            cd chat4gamers/apps/next
            yarn version patch 
            
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
            
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add package.json
            git commit -m "chore(release): bump version to $NEW_VERSION [skip ci]"
            
            git tag v$NEW_VERSION
            git push origin main --tags
        env:
          GITHUB_TOKEN: ${{ secrets.MY_PAT_TOKEN }}


      # 3. ONLY Sync jarvis-deploy if the server folder changed
      - name: Sync jarvis-deploy
        if: steps.filter.outputs.server == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git fetch origin
          git checkout jarvis-deploy
          git merge main --ff-only
          git push origin jarvis-deploy