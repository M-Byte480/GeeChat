name: Main Orchestrator

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'chat4gamers/apps/next/package.json'

jobs:
  analyze-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      server_changed: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_PAT_TOKEN }}
          persist-credentials: false

      # 1. Detect which folders changed
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'chat4gamers/apps/server/**'
              - 'chat4gamers/package.json'


      - name: Manual Yarn Version Bump
        id: version_bump
        run: |
          cd chat4gamers/apps/next
          
          yarn version patch --no-deferred
          
          # 2. Sync the lockfile WITHOUT running build scripts (Crucial)
          yarn install --mode=skip-build
          
          # 2. Extract version for Git
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "Bumping to $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          
          # 3. Configure Git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 4. Commit the change back to main
          git add package.json
          git commit -m "chore(release): bump version to $NEW_VERSION [skip ci]" || echo "No changes"
          
          # 5. Create the tag locally
          git tag -f v$NEW_VERSION
          
          # 6. Push using the PAT URL to trigger the next pipeline
          git push https://x-access-token:${{ secrets.MY_PAT_TOKEN }}@github.com/${{ github.repository }}.git main --tags --force


      # 3. ONLY Sync jarvis-deploy if the server folder changed
      - name: Sync jarvis-deploy
        if: steps.filter.outputs.server == 'true'

        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git remote set-url origin https://x-access-token:${{ secrets.MY_PAT_TOKEN }}@github.com/${{ github.repository }}.git
          
          git fetch origin
          git checkout jarvis-deploy
          git merge main --ff-only
          git push origin jarvis-deploy

  build-windows:
    needs: analyze-and-sync
    runs-on: windows-latest
    defaults:
      run:
        working-directory: chat4gamers/apps/next
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: chat4gamers/yarn.lock

      - name: Install Dependencies
        run: yarn install

      - name: Build Electron App
        run: yarn package # This runs your: electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGNING: true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-builds
          path: chat4gamers/apps/next/dist-electron/
          retention-days: 1

  upload-to-server:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/updates
            rm -f latest.yml *.exe *.blockmap

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: electron-builds
          path: ./dist-electron

      - name: Upload to NixOS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Files are now in the root of the runner's ./dist-electron folder
          source: "dist-electron/latest.yml,dist-electron/*.exe,dist-electron/*.blockmap"
          target: "/var/www/updates/"
          strip_components: 1
          overwrite: true
          rm: false